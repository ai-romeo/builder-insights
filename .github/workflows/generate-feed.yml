name: Generate Feed

on:
  schedule:
    # Run every 6 hours for tweets, every 24 hours for podcasts
    - cron: '0 */6 * * *'  # Tweets: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 0 * * *'    # Podcasts: 00:00 UTC (daily)
  workflow_dispatch:       # Allow manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json
      
      - name: Install dependencies
        run: |
          cd scripts
          npm ci
      
      - name: Generate X/Twitter feed
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: |
          cd scripts
          node generate-feed.js --tweets-only
        continue-on-error: true
      
      - name: Generate Podcast feed
        env:
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
        run: |
          cd scripts
          node generate-feed.js --podcasts-only
        continue-on-error: true
      
      - name: Commit and push if changed
        run: |
          git config --local user.email "ai-romeo@users.noreply.github.com"
          git config --local user.name "ai-romeo"
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "chore: auto-update feed $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "No changes to commit"
          fi
        continue-on-error: true
